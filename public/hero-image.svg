<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Dashboard Container -->
  <rect x="40" y="40" width="1200" height="640" rx="16" fill="white" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Header Bar -->
  <rect x="40" y="40" width="1200" height="60" rx="16" fill="url(#blueGradient)"/>
  <text x="70" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">FinFlow Dashboard</text>

  <!-- Top Stats Row -->
  <g id="stat1">
    <rect x="60" y="130" width="280" height="100" rx="12" fill="#f0f9ff" stroke="#0369a1" stroke-width="1"/>
    <text x="90" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b">Total Balance</text>
    <text x="90" y="195" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0369a1">$12,450</text>
    <text x="90" y="215" font-family="Arial, sans-serif" font-size="12" fill="#059669">+2.5% this month</text>
  </g>

  <g id="stat2">
    <rect x="380" y="130" width="280" height="100" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
    <text x="410" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b">Monthly Spending</text>
    <text x="410" y="195" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#059669">$3,280</text>
    <text x="410" y="215" font-family="Arial, sans-serif" font-size="12" fill="#0369a1">-1.2% from last month</text>
  </g>

  <g id="stat3">
    <rect x="700" y="130" width="280" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="730" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b">Budget Used</text>
    <text x="730" y="195" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#d97706">68%</text>
    <text x="730" y="215" font-family="Arial, sans-serif" font-size="12" fill="#059669">On track</text>
  </g>

  <!-- Chart Section -->
  <g id="chartContainer">
    <rect x="60" y="260" width="600" height="280" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="90" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Spending Overview</text>

    <!-- Bar Chart -->
    <g id="barChart">
      <!-- Y axis -->
      <line x1="100" y1="310" x2="100" y2="500" stroke="#cbd5e1" stroke-width="2"/>
      <!-- X axis -->
      <line x1="100" y1="500" x2="600" y2="500" stroke="#cbd5e1" stroke-width="2"/>

      <!-- Bars -->
      <rect x="140" y="420" width="40" height="80" fill="url(#blueGradient)" rx="4"/>
      <text x="155" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Jan</text>

      <rect x="210" y="380" width="40" height="120" fill="url(#blueGradient)" rx="4"/>
      <text x="225" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Feb</text>

      <rect x="280" y="360" width="40" height="140" fill="url(#blueGradient)" rx="4"/>
      <text x="295" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Mar</text>

      <rect x="350" y="330" width="40" height="170" fill="url(#greenGradient)" rx="4"/>
      <text x="365" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Apr</text>

      <rect x="420" y="340" width="40" height="160" fill="url(#blueGradient)" rx="4"/>
      <text x="435" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">May</text>

      <rect x="490" y="350" width="40" height="150" fill="url(#blueGradient)" rx="4"/>
      <text x="505" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Jun</text>
    </g>
  </g>

  <!-- Recent Transactions -->
  <g id="transactionsContainer">
    <rect x="700" y="260" width="500" height="280" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="730" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Recent Transactions</text>

    <!-- Transaction items -->
    <g id="transaction1">
      <circle cx="730" cy="330" r="20" fill="#e0f2fe"/>
      <text x="730" y="335" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">🛒</text>
      <text x="770" y="328" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Grocery Store</text>
      <text x="770" y="345" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Today at 2:30 PM</text>
      <text x="1150" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="end">-$45.50</text>
    </g>

    <line x1="730" y1="365" x2="1170" y2="365" stroke="#e2e8f0"/>

    <g id="transaction2">
      <circle cx="730" cy="410" r="20" fill="#f0fdf4"/>
      <text x="730" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">💰</text>
      <text x="770" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Salary Deposit</text>
      <text x="770" y="425" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Yesterday at 9:00 AM</text>
      <text x="1150" y="415" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#059669" text-anchor="end">+$2,500</text>
    </g>

    <line x1="730" y1="445" x2="1170" y2="445" stroke="#e2e8f0"/>

    <g id="transaction3">
      <circle cx="730" cy="490" r="20" fill="#fef3c7"/>
      <text x="730" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="middle">☕</text>
      <text x="770" y="488" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Coffee Shop</text>
      <text x="770" y="505" font-family="Arial, sans-serif" font-size="12" fill="#64748b">2 days ago at 8:15 AM</text>
      <text x="1150" y="495" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="end">-$5.80</text>
    </g>
  </g>
</svg>